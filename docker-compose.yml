services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai_data_analyst
      POSTGRES_PASSWORD: ai_data_analyst
      POSTGRES_DB: ai_data_analyst
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_data_analyst"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://ai_data_analyst:ai_data_analyst@db:5432/ai_data_analyst
      UPLOAD_DIRECTORY: /app/uploaded_files
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - uploaded_files:/app/uploaded_files
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        # The browser calls the backend through the host-published port,
        # so this stays localhost even inside Compose.
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploaded_files: